<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structures — A Visual Guide to Abstract Data Types</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f5f1eb;
    --paper-warm: #ece6da;
    --accent: #c4440a;
    --accent-light: #e8d5c4;
    --muted: #8a8075;
    --rule: #d4cdc2;
    --node-fill: #fff;
    --node-stroke: #1a1a1a;
    --highlight: #fef3e0;
    --success: #2d6a4f;
    --danger: #c4440a;
    --canvas-bg: #faf8f4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Masthead ─── */
  .masthead {
    text-align: center;
    padding: 3rem 2rem 2rem;
    border-bottom: 3px double var(--ink);
    position: relative;
  }

  .masthead h1 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 0.95;
  }

  .masthead h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .masthead .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 1rem;
  }

  .edition-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 2rem;
    border-bottom: 1px solid var(--rule);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ─── Navigation ─── */
  .nav-strip {
    display: flex;
    gap: 0;
    overflow-x: auto;
    border-bottom: 1px solid var(--rule);
    scrollbar-width: none;
  }
  .nav-strip::-webkit-scrollbar { display: none; }

  .nav-btn {
    flex: none;
    padding: 1rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: none;
    border: none;
    border-right: 1px solid var(--rule);
    cursor: pointer;
    color: var(--muted);
    transition: all 0.3s ease;
    position: relative;
    white-space: nowrap;
  }

  .nav-btn:hover { color: var(--ink); background: var(--highlight); }

  .nav-btn.active {
    color: var(--ink);
    background: var(--paper-warm);
    font-weight: 500;
  }

  .nav-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
  }

  /* ─── Layout ─── */
  .page-body {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 200px);
  }

  @media (max-width: 900px) {
    .page-body { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ─── Sidebar ─── */
  .sidebar {
    border-right: 1px solid var(--rule);
    padding: 2rem 1.5rem;
  }

  .sidebar-section {
    margin-bottom: 2rem;
  }

  .sidebar-section h3 {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--rule);
  }

  .sidebar-section p {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--ink);
  }

  .complexity-table {
    width: 100%;
    font-size: 0.8rem;
    border-collapse: collapse;
  }

  .complexity-table td {
    padding: 0.35rem 0;
    border-bottom: 1px dotted var(--rule);
  }

  .complexity-table td:first-child {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .complexity-table td:last-child {
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
  }

  /* ─── Main Content ─── */
  .main-content {
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  .section-header h2 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 2.2rem;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  .section-header .issue-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  /* ─── Canvas / Visualizer ─── */
  .viz-canvas {
    background: var(--canvas-bg);
    border: 1px solid var(--rule);
    border-radius: 2px;
    min-height: 380px;
    position: relative;
    overflow: hidden;
  }

  .viz-canvas svg {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
  }

  .viz-canvas .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-style: italic;
    font-size: 0.95rem;
  }

  .empty-state .ornament {
    font-family: 'Instrument Serif', serif;
    font-size: 2.5rem;
    color: var(--rule);
    margin-bottom: 0.5rem;
  }

  /* ─── Controls ─── */
  .controls-bar {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .ctrl-input {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.55rem 0.8rem;
    border: 1px solid var(--rule);
    background: var(--node-fill);
    color: var(--ink);
    width: 120px;
    transition: border-color 0.2s;
  }

  .ctrl-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .ctrl-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.6rem 1.2rem;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .ctrl-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  .ctrl-btn.outline {
    background: transparent;
    color: var(--ink);
  }

  .ctrl-btn.outline:hover {
    background: var(--ink);
    color: var(--paper);
  }

  .ctrl-btn.danger {
    border-color: var(--danger);
    background: transparent;
    color: var(--danger);
  }

  .ctrl-btn.danger:hover {
    background: var(--danger);
    color: var(--paper);
  }

  .ctrl-spacer { flex: 1; }

  /* ─── Log / Console ─── */
  .op-log {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    padding: 0.8rem 1rem;
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    max-height: 100px;
    overflow-y: auto;
    line-height: 1.8;
  }

  .op-log .log-entry { display: block; }
  .op-log .log-entry .timestamp { color: var(--rule); margin-right: 0.5rem; }
  .op-log .log-entry .op { color: var(--accent); }
  .op-log .log-entry .val { color: var(--ink); font-weight: 500; }

  /* ─── Node Styles (SVG) ─── */
  .node-circle {
    fill: var(--node-fill);
    stroke: var(--node-stroke);
    stroke-width: 1.5;
    transition: all 0.4s ease;
  }

  .node-circle.highlight {
    fill: var(--highlight);
    stroke: var(--accent);
    stroke-width: 2;
  }

  .node-text {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    fill: var(--ink);
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }

  .edge-line {
    stroke: var(--ink);
    stroke-width: 1.2;
    fill: none;
    transition: all 0.4s ease;
  }

  .node-rect {
    fill: var(--node-fill);
    stroke: var(--node-stroke);
    stroke-width: 1.5;
    transition: all 0.4s ease;
  }

  .node-rect.highlight {
    fill: var(--highlight);
    stroke: var(--accent);
  }

  /* ─── Animations ─── */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  @keyframes dropIn {
    0% { opacity: 0; transform: translateY(-30px); }
    60% { transform: translateY(4px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .animate-in { animation: fadeSlideIn 0.4s ease forwards; }
  .animate-pulse { animation: pulse 0.5s ease; }
  .animate-drop { animation: dropIn 0.45s ease forwards; }

  /* ─── Footer ─── */
  .page-footer {
    text-align: center;
    padding: 2rem;
    border-top: 3px double var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2rem;
  }

  .page-footer .finis {
    font-family: 'Instrument Serif', serif;
    font-size: 1.5rem;
    color: var(--rule);
    display: block;
    margin-bottom: 0.5rem;
  }

  /* ─── Smooth transitions for panel switching ─── */
  .panel { display: none; }
  .panel.active { display: flex; flex-direction: column; gap: 1.5rem; animation: fadeSlideIn 0.35s ease; }

  /* ─── Array-based viz (stack, queue, hashmap) ─── */
  .array-viz {
    display: flex;
    gap: 0;
    align-items: flex-end;
    min-height: 200px;
    padding: 2rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .array-cell {
    width: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: dropIn 0.35s ease forwards;
  }

  .array-cell .cell-box {
    width: 52px;
    height: 52px;
    border: 1.5px solid var(--node-stroke);
    background: var(--node-fill);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.3s ease;
  }

  .array-cell .cell-box.highlight {
    background: var(--highlight);
    border-color: var(--accent);
  }

  .array-cell .cell-idx {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .array-cell .cell-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--accent);
    margin-bottom: 0.3rem;
    min-height: 1em;
  }

  /* Hash map bucket chain */
  .bucket-chain {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .bucket-chain .cell-box {
    width: 52px;
    height: 36px;
    font-size: 0.75rem;
  }

  .arrow-indicator {
    font-family: 'Instrument Serif', serif;
    font-size: 1.2rem;
    color: var(--accent);
    margin: 0 0.3rem;
    align-self: center;
  }
</style>
</head>
<body>

<!-- ─── Masthead ─── -->
<header class="masthead">
  <h1><em>Structures</em></h1>
  <div class="subtitle">An Interactive Visual Guide to Abstract Data Types</div>
</header>

<div class="edition-bar">
  <span>Data Structures &amp; Algorithms</span>
  <span id="todayDate"></span>
</div>

<!-- ─── Navigation ─── -->
<nav class="nav-strip" id="navStrip">
  <button class="nav-btn active" data-panel="stack">Stack</button>
</nav>

<!-- ─── Page Body ─── -->
<div class="page-body">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebarContent">
    <!-- Dynamically populated -->
  </aside>

  <!-- Main Content -->
  <main class="main-content">

    <!-- ═══ STACK ═══ -->
    <div class="panel active" id="panel-stack">
      <div class="section-header">
        <h2>Stack</h2>
        <span class="issue-num">LIFO — Last In, First Out</span>
      </div>
      <div class="controls-bar">
        <input class="ctrl-input" id="stackInput" type="number" placeholder="Value">
        <button class="ctrl-btn" onclick="stackPush()">Push</button>
        <button class="ctrl-btn outline" onclick="stackPop()">Pop</button>
        <button class="ctrl-btn outline" onclick="stackPeek()">Peek</button>
        <span class="ctrl-spacer"></span>
        <button class="ctrl-btn danger" onclick="stackClear()">Clear</button>
      </div>
      <div class="viz-canvas" id="stackCanvas">
        <div class="empty-state"><span class="ornament">§</span>Push a value to begin</div>
      </div>
      <div class="op-log" id="stackLog"></div>
    </div>

  </main>
</div>

<footer class="page-footer">
    Structures — A study companion for Data Structures &amp; Algorithms
</footer>

<script>
// ═══════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════
const $ = id => document.getElementById(id);
const now = () => new Date().toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

function log(logId, op, detail) {
  const el = $(logId);
  const entry = document.createElement('span');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="timestamp">${now()}</span><span class="op">${op}</span> ${detail}`;
  el.prepend(entry);
  if (el.children.length > 50) el.removeChild(el.lastChild);
}

// ═══════════════════════════════════════════════
//  SIDEBAR DATA
// ═══════════════════════════════════════════════
const sidebarData = {
  stack: {
    description: 'A stack is a linear collection where elements are added and removed from the same end — the <em>top</em>. Think of a stack of plates: the last plate placed on top is the first one taken off.',
    complexity: [['push','O(1)'],['pop','O(1)'],['peek','O(1)'],['search','O(n)']],
    impl: 'Array or Linked List'
  },
};

function updateSidebar(panel) {
  const data = sidebarData[panel];
  if (!data) return;
  let html = `<div class="sidebar-section"><h3>About</h3><p>${data.description}</p></div>`;
  html += `<div class="sidebar-section"><h3>Time Complexity</h3><table class="complexity-table">`;
  data.complexity.forEach(([op, c]) => {
    html += `<tr><td>${op}</td><td>${c}</td></tr>`;
  });
  html += `</table></div>`;
  html += `<div class="sidebar-section"><h3>Implementation</h3><p>${data.impl}</p></div>`;
  $('sidebarContent').innerHTML = html;
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const panel = btn.dataset.panel;
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    $('panel-' + panel).classList.add('active');
    updateSidebar(panel);
  });
});

// Set date
$('todayDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

// Init sidebar
updateSidebar('stack');

// ═══════════════════════════════════════════════
//  STACK
// ═══════════════════════════════════════════════
let stackData = [];

function renderStack() {
  const c = $('stackCanvas');
  if (stackData.length === 0) { c.innerHTML = '<div class="empty-state"><span class="ornament">§</span>Push a value to begin</div>'; return; }
  let html = '<div class="array-viz" style="flex-direction:column-reverse;align-items:center;justify-content:flex-start;padding-top:1.5rem">';
  stackData.forEach((v, i) => {
    const isTop = i === stackData.length - 1;
    html += `<div class="array-cell" style="animation-delay:${i*40}ms;flex-direction:row;gap:0.5rem">
      <span class="cell-label">${isTop ? '→ top' : ''}</span>
      <div class="cell-box ${isTop ? 'highlight' : ''}" style="width:100px">${v}</div>
      <span class="cell-idx">[${i}]</span>
    </div>`;
  });
  html += '</div>';
  c.innerHTML = html;
}

function stackPush() {
  const v = $('stackInput').value; if (v === '') return;
  stackData.push(Number(v));
  log('stackLog', 'push', `<span class="val">${v}</span> → top of stack (size: ${stackData.length})`);
  $('stackInput').value = '';
  renderStack();
}
function stackPop() {
  if (!stackData.length) { log('stackLog', 'pop', 'stack is empty — underflow'); return; }
  const v = stackData.pop();
  log('stackLog', 'pop', `<span class="val">${v}</span> removed from top (size: ${stackData.length})`);
  renderStack();
}
function stackPeek() {
  if (!stackData.length) { log('stackLog', 'peek', 'stack is empty'); return; }
  log('stackLog', 'peek', `top = <span class="val">${stackData[stackData.length-1]}</span>`);
}
function stackClear() { stackData = []; renderStack(); log('stackLog', 'clear', 'stack emptied'); }

// ─── Enter key handling ───
document.querySelectorAll('.ctrl-input').forEach(input => {
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const btn = input.parentElement.querySelector('.ctrl-btn');
      if (btn) btn.click();
    }
  });
});
</script>
</body>
</html>
